 bm_manpads_equipment:0 "ПЗРК"
 bm_manpads_equipment_desc:0 "Переносные зенитно-ракетные комплексы. Плечевые пусковые установки, представляющие серьёзную угрозу для вертолётов и самолётов."
 bm_manpads_equipment_0:0 "ПЗРК"
 bm_manpads_equipment_0_desc:0 "Переносные зенитно-ракетные комплексы. Плечевые пусковые установки, представляющие серьёзную угрозу для вертолётов и самолётов."
 bm_manpads_support_company:0 "Рота ПЗРК"
 bm_manpads_support_company_desc:0 "Специализированное подразделение, оснащённое переносными средствами ПВО, обеспечивающее эффективную защиту от вражеских самолётов и вертолётов."
 bm_manpads_project:0 "ПЗРК"
 bm_manpads_project_desc:0 "Разработать лёгкие переносные средства ПВО, чтобы обеспечить армию эффективным инструментом против вражеской авиации и вертолётов."
