 bm_mobile_dockyard_project:0 "Мобильный док"
 bm_mobile_dockyard_project_desc:0 "Мобильные доки погружаются под повреждённый корабль и откачивают воду, поднимая его над ватерлинией. Затем корабль фиксируется на палубе дока, что позволяет проводить ремонт ниже ватерлинии."
