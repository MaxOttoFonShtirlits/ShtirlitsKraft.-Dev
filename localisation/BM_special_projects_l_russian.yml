 bm_industry_efficiency_project_tip_tt:0 "Вы можете снизить необходимую стоимость прорыва для этого проекта до §Y0§!, исследовав технологии $TECH_1|Y$, а также либо $TECH_2|Y$, либо $TECH_3|Y$."

 bm_anti_ship_launcher_1:0 "Пусковая Установка Противокорабельных Ракет"
 bm_anti_ship_launcher_1_desc:0 "Современные системы противокорабельных ракет, повышающие способность вести огонь по вражеским кораблям на дальних дистанциях."
 bm_anti_ship_missile_project:0 "Противокорабельная Ракета"
 bm_anti_ship_missile_project_desc:0 "Сосредоточение усилий на разработке и внедрении передовых противокорабельных ракетных систем, способных поражать вражеские суда с непревзойдённой точностью и мощью."
 bm_anti_ship_missile_desc_tt:0 "Противокорабельная ракета — это управляемая ракета, предназначенная для использования против кораблей и крупных судов."
 bm_anti_ship_missile_project_missile_tt:0 "\n£$ICON$  $NAME|Y$\n\n$DESC$\n"
 bm_anti_ship_missile_project_module_tt:0 "§YМодуль Оборудования:§!\n$NAME$ \n\n£$ICON$\n\n\n$DESC$\n"
 bm_anti_ship_missile_project_reward:0 "Фокус Бонуса"
 bm_anti_ship_missile_project_reward_desc:0 "Сконцентрируйтесь на улучшении шаблона эсминца или шаблона крейсера."
 bm_anti_ship_missile_project_option_1:0 "Бонус Шаблона Эсминца"
 bm_anti_ship_missile_project_option_2:0 "Бонус Шаблона Крейсера"
 bm_anti_ship_missile_project_template_bonus_1:0 "Улучшенный Эсминец и Продвинутый Эсминец"
 bm_anti_ship_missile_project_template_bonus_2:0 "Улучшенный Крейсер и Продвинутый Крейсер"
 bm_anti_ship_missile_project_tip_tt:0 "Вы можете снизить необходимую стоимость прорыва для этого проекта до §Y1§!, исследовав $TECH_1|Y$."

 bm_packed_hanger_deck_1:0 "Уплотнённая Палуба Ангара"
 bm_packed_hanger_deck_1_desc:0 "Максимизирует хранение самолётов на авианосцах, увеличивая вместимость авиакрыла ценой роста стоимости производства и снижения гибкости эксплуатации."
 bm_packed_hanger_deck_project:0 "Уплотнённая Палуба Ангара"
 bm_packed_hanger_deck_project_desc:0 "Переработка ангарных систем авианосцев для максимального увеличения хранения самолётов, значительно расширяя вместимость авиакрыльев. Позволяет авианосцам нести больше авиации, обеспечивая решающее преимущество в морских сражениях."
 bm_packed_hanger_deck_project_deck_desc_tt:0 "Хотя это улучшение усиливает воздушную мощь авианосца, оно увеличивает стоимость производства и снижает эксплуатационную гибкость."
 bm_packed_hanger_deck_project_deck_tt:0 "\n£$ICON$  $NAME|Y$\n\n$DESC$\n"
 bm_packed_hanger_deck_project_packed_tt:0 "§YМодуль Оборудования:§!\n$NAME$ \n\n£$ICON$\n\n\n$DESC$\n"
 bm_packed_hanger_deck_project_reward:0 "Морская Дилемма"
 bm_packed_hanger_deck_project_reward_desc:0 "По мере того как исследователи вашей страны расширяют границы военно-морских технологий, вам предстоит решить, на чём сосредоточить их усилия:"
 bm_packed_hanger_deck_project_reward_option_1:0 "Бонус Технологий Авианосцев"
 bm_packed_hanger_deck_project_reward_option_2:0 "Бонус Шаблона Авианосца"
 bm_packed_hanger_deck_project_reward_tech_bonus:0 "Технологии Авианосцев"
 bm_packed_hanger_deck_project_reward_design_bonus:0 "Корпус Корабля — Авианосец"
 bm_packed_hanger_deck_project_tip_tt:0 "Вы можете снизить необходимую стоимость прорыва для этого проекта до §Y0§!, исследовав $TECH_1|Y$."

 bm_attack_helicopter_equipment:0 "Ударный вертолёт"
 bm_attack_helicopter_equipment_desc:0 "Универсальный боевой вертолёт, предназначенный для огневой поддержки, борьбы с бронетехникой и ведения разведки на поле боя."
 bm_attack_helicopter_equipment_0:0 "Ударный вертолёт"
 bm_attack_helicopter_equipment_0_desc:0 "Универсальный боевой вертолёт, предназначенный для огневой поддержки, борьбы с бронетехникой и ведения разведки на поле боя."
 bm_attack_helicopter_company:0 "Рота ударных вертолётов"
 bm_attack_helicopter_company_desc:0 "Воздушная огневая мощь, противотанковые возможности и улучшенная разведка. Повышает мобильность и эффективность наземных войск."
 bm_attack_helicopter_project:0 "Ударный вертолёт"
 bm_attack_helicopter_project_desc:0 "Продвинутые ударные вертолёты для огневой поддержки и борьбы с бронетехникой, повышающие мобильность, огневую мощь и адаптивность ваших наземных подразделений."
