 bm_stealth_jet_project:0 "Программа стелс-самолётов"
 bm_stealth_jet_project_desc:0 "Два новейших самолёта: стелс-бомбардировщик, способный наносить высокоточные удары, оставаясь незамеченным, и стелс-истребитель, созданный для доминирования в воздухе благодаря непревзойдённой манёвренности и малозаметности."
 bm_stealth_bomber_equipment:0 "Стелс-бомбардировщик"
 bm_stealth_bomber_equipment_desc:0 "Разработан для скрытного прорыва вражеской обороны и нанесения сокрушительных ударов с высочайшей точностью."
 bm_stealth_bomber_equipment_short:0 "Стелс-бомбардировщик"
 bm_stealth_bomber_equipment_0:0 "Стелс-бомбардировщик"
 bm_stealth_bomber_equipment_0_desc:0 "Разработан для скрытного прорыва вражеской обороны и нанесения сокрушительных ударов с высочайшей точностью."
 bm_stealth_bomber_equipment_0_short:0 "Стелс-бомбардировщик"
 bm_stealth_fighter_equipment:0 "Стелс-истребитель"
 bm_stealth_fighter_equipment_desc:0 "Спроектирован для доминирования в воздухе: перехватывает вражеские самолёты и уничтожает угрозы прежде, чем те успеют его заметить."
