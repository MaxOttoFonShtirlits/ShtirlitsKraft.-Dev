 bm_explosive_reactive_armor_1:0 "Динамическая защита"
 bm_explosive_reactive_armor_1_desc:0 "Разработка технологии динамической защиты (ДЗ) для повышения живучести бронетехники."
 bm_explosive_reactive_armor_project:0 "Динамическая защита"
 bm_explosive_reactive_armor_project_desc:0 "Разработка технологии динамической защиты (ДЗ), предназначенной для повышения живучести бронетехники и обеспечивающей значительную защиту от противотанкового вооружения."
 bm_explosive_reactive_armor_project_module_tt:0 "\n£$ICON$  $NAME|Y$ \n\n$DESC$"
 bm_explosive_reactive_armor_project_reward_1:0 "Фокус на учёных"
 bm_explosive_reactive_armor_project_reward_1_desc:0 "Получите умеренный прогресс для ускорения исследований или рискните получить небольшой прирост опыта учёных либо трейт «Специалист по бронетехнике» для экспертизы в области бронированных технологий."
 bm_explosive_reactive_armor_project_option_1:0 "Умеренный прорыв"
 bm_explosive_reactive_armor_project_option_2:0 "Специалист по бронетехнике"


 bm_combat_drugs_project:0 "Боевые стимуляторы"
 bm_combat_drugs_project_desc:0 "Чтобы получить военное превосходство, ваши учёные предлагают разработать препараты, повышающие физические и психологические возможности солдат."
 bm_combat_drugs_project_tt:0 "\n£$ICON$  $NAME|Y$ \n\n$DESC$"
 bm_combat_drugs_project_tt_name:0 "Боевые стимуляторы"
 bm_combat_drugs_project_tt_desc:0 "Специализированные боевые препараты, созданные для улучшения физической и психической выносливости солдат на поле боя."
 bm_combat_drugs_project_reward:0 "Этические дилеммы"
 bm_combat_drugs_project_reward_desc:0 "Стремясь повысить эффективность армии, ваши учёные предлагают разработку боевых препаратов. Однако испытания этих веществ вызывают этические вопросы, и нации предстоит решить, как действовать."
 bm_combat_drugs_project_reward_animal_testing:0 "Испытания на животных"
 bm_combat_drugs_project_reward_animal_testing_tt:0 "\n£$ICON$  $NAME|Y$\n\n$DESC$\n\n§YЭффекты§!§W:"
 bm_combat_drugs_project_reward_animal_testing_tt_name:0 "Испытания на животных"
 bm_combat_drugs_project_reward_animal_testing_tt_desc:0 "Использовать животных в качестве подопытных для изучения воздействия боевых препаратов. Этот подход ускоряет разработку, но вызывает серьёзные этические споры."
 bm_sp_combat_drugs_animal_testing:0 "Боевые стимуляторы"
 bm_sp_combat_drugs_animal_testing_desc:0 "Специализированные боевые препараты, созданные для улучшения физической и психической выносливости солдат на поле боя."
 bm_combat_drugs_project_reward_human_testing:0 "Эксперименты на людях"
 bm_combat_drugs_project_reward_human_testing_tt:0 "\n£$ICON$  $NAME|Y$\n\n$DESC$\n\n§YЭффекты§!§W:"
 bm_combat_drugs_project_reward_human_testing_tt_name:0 "Эксперименты на людях"
 bm_combat_drugs_project_reward_human_testing_tt_desc:0 "Проводить испытания на людях в контролируемой среде. Хотя этот метод ближе к этическим нормам, он медленнее и несёт риск скандала, если информация об исследованиях просочится наружу."
 bm_sp_combat_drugs_human_testing:0 "Боевые стимуляторы"
 bm_sp_combat_drugs_human_testing_desc:0 "Специализированные боевые препараты, созданные для улучшения физической и психологической выносливости солдат на поле боя."


 bm_gatling_autocannon_1:0 "Автопушка Гатлинга"
 bm_gatling_autocannon_1_desc:0 "Многствольная автоматическая пушка с высокой скорострельностью."
 bm_gatling_autocannon_project:0 "Автопушка Гатлинга"
 bm_gatling_autocannon_project_desc:0 "Интеграция многоствольной автопушки с высокой скорострельностью. Усиливает огневую мощь авиации, оснащая её системой, способной выпускать стремительные очереди разрушительных снарядов."
 bm_gatling_autocannon_project_tt:0 "§YМодуль снаряжения:§!\n$NAME$ \n\n£$ICON$ \n\n$DESC$"
 bm_gatling_autocannon_project_template_reward:0 "Фокус на проектировании"
 bm_gatling_autocannon_project_template_reward_desc:0 "Предоставит значительный бонус для ваших будущих проектов самолётов."
 bm_gatling_autocannon_project_template_reward_option_1:0 "Малый планер"
 bm_gatling_autocannon_project_template_reward_option_2:0 "Средний планер"
 bm_gatling_autocannon_project_template_reward_option_3:0 "Тяжёлый планер"
 bm_gatling_autocannon_project_template_bonus_1:0 "§YКаркас малого самолёта§!"
 bm_gatling_autocannon_project_template_bonus_2:0 "§YКаркас среднего самолёта§!"
 bm_gatling_autocannon_project_template_bonus_3:0 "§YКаркас тяжёлого самолёта§!"
 bm_gatling_autocannon_project_tt_desc:0 "Многоствольная автопушка с высокой скорострельностью. Способна выпускать мощные очереди разрушительных снарядов."


 bm_gravitational_suit_project_tt:0 "§YМодуль снаряжения:§!\n$NAME$ \n\n£$ICON$ \n\n$DESC$"
 bm_gravitational_suit_project:0 "Гравитационный костюм"
 bm_gravitational_suit_project_desc:0 "По мере увеличения скорости самолётов пилотам требуется улучшенная подготовка и экипировка для выдерживания перегрузок. G-костюм повышает устойчивость к ним, а в сочетании с превосходной подготовкой даёт нашим лётчикам преимущество в воздушном бою."
 bm_gravitational_suit_tip_tt:0 "Вы можете снизить стоимость прорыва для этого проекта до §Y1§!, исследовав $TECH_1|Y$, а также либо $TECH_2|Y$, либо $TECH_3|Y$."
 bm_gravitational_suit_1:0 "Малый гравитационный костюм"
 bm_gravitational_suit_1_desc:0 "Гравитационный костюм (или G-костюм) повышает устойчивость пилотов к перегрузкам. В сочетании с превосходной подготовкой он даёт нашим лётчикам заметное преимущество над противником."
 bm_gravitational_suit_2:0 "Средний гравитационный костюм"
 bm_gravitational_suit_2_desc:0 "Гравитационный костюм (или G-костюм) повышает устойчивость пилотов к перегрузкам. В сочетании с превосходной подготовкой он даёт нашим лётчикам заметное преимущество над противником."
 bm_gravitational_suit:0 "Гравитационный костюм"
 bm_gravitational_suit_desc:0 "Гравитационный костюм (или G-костюм) повышает устойчивость пилотов к перегрузкам."


 bm_anti_aircraft_system_project:0 "Зенитная система"
 bm_anti_aircraft_system_project_desc:0 "Современные корабельные платформы, оснащённые новейшими зенитными ракетными комплексами. Улучшают способность флота отражать воздушные атаки противника, обеспечивая дальнобойную защиту ключевых морских сил."
 bm_anti_aircraft_system_1:0 "Зенитная система"
 bm_anti_aircraft_system_1_desc:0 "Современные зенитные ракетные комплексы, повышающие способность перехватывать и нейтрализовывать вражеские самолёты."
 bm_anti_aircraft_system_project_tt:0 "§YМодуль оборудования:§!\n$NAME$ \n\n£$ICON$ \n\n$DESC$"

 bm_anti_aircraft_truck_project:0 "Моторизованные ЗУР"
 bm_anti_aircraft_truck_project_desc:0 "Мобильная система ПВО — ЗРК на автомобильном шасси, предназначенная для гибкой противовоздушной поддержки на поле боя и эффективного противодействия вражеским воздушным угрозам."
 bm_anti_aircraft_truck_equipment:0 "Зенитный грузовик"
 bm_anti_aircraft_truck_equipment_desc:0 "Мобильная система ПВО, обеспечивающая гибкую противовоздушную поддержку на поле боя."
 bm_anti_aircraft_truck_equipment_0:0 "Зенитный грузовик"
 bm_anti_aircraft_truck_equipment_0_desc:0 "Мобильная система ПВО, обеспечивающая гибкую противовоздушную поддержку на поле боя."
 bm_anti_aircraft_truck_project_tt_eq:0 "§YРазблокировать оборудование:§!\n$NAME$ \n\n£$ICON$ \n\n$DESC$"
 bm_anti_aircraft_truck_project_tt_unit:0 "§YРазблокировать оборудование:§!\n$NAME$ \n\n£$ICON$ \n\n$DESC$"
 bm_motorized_guided_anti_air:0 "Мот. управляемая ПВО"
 bm_motorized_guided_anti_air_desc:0 "Применяется для эффективного противодействия воздушным угрозам противника."

 bm_swept_wing_1:0 "Стреловидное крыло"
 bm_swept_wing_1_desc:0 "Улучшенные характеристики на высоких скоростях и повышенная устойчивость. За счёт обратного угла стреловидности уменьшается сопротивление и повышается манёвренность."
 bm_swept_wing_project:0 "Стреловидные крылья"
 bm_swept_wing_project_desc:0 "Значительно улучшат характеристики нашей авиации. Скосив крылья назад, мы уменьшаем сопротивление на высоких скоростях, повышая устойчивость и обеспечивая более высокую скорость и манёвренность самолётов."
 bm_swept_wing_project_tt:0 "§YМодуль оборудования:§!\n$NAME$ \n\n£$ICON$ \n\n$DESC$"

 bm_delta_wing_1:0 "Дельтовидное крыло"
 bm_delta_wing_1_desc:0 "Треугольная, дельтовидная конструкция крыла. Такая форма обеспечивает улучшенные характеристики на высоких скоростях и повышенную стабильность на сверхзвуке, что делает её особенно эффективной для истребителей и перехватчиков."
 bm_delta_wing_project:0 "Дельтовидные крылья"
 bm_delta_wing_project_desc:0 "Высокопроизводительные самолёты с характерным треугольным крылом. Такая компоновка обеспечивает превосходную манёвренность на больших скоростях и высокую устойчивость как на дозвуковых, так и на сверхзвуковых режимах."
 bm_delta_wing_project_tt:0 "§YМодуль оборудования:§!\n$NAME$ \n\n£$ICON$ \n\n$DESC$"

 bm_industry_efficiency_project:0 "Эффективность Промышленности"
 bm_industry_efficiency_project_desc:0 "Резко повысить эффективность наших заводов. Возможность модернизировать наши производственные мощности, сосредоточившись либо на расширении военного производства, либо на укреплении гражданской промышленной базы."
 bm_industry_efficiency_mil_dynamic_modifier:0 "Эффективность Военной Промышленности"
 bm_industry_efficiency_mil_dynamic_modifier_desc:0 "Оптимизация производства военных материалов для повышения скорости и объёма работы военных фабрик."
 bm_industry_efficiency_civ_dynamic_modifier:0 "Эффективность Гражданской Промышленности"
 bm_industry_efficiency_civ_dynamic_modifier_desc:0 "Благодаря передовым производственным методам, лучшему управлению ресурсами и улучшенным трудовым практикам мы можем повысить выпуск гражданских товаров."
 bm_industry_efficiency_project_rewards:0 "Промышленный Фокус"
 bm_industry_efficiency_project_rewards_desc:0 "Улучшить эффективность наших фабрик. Возможность модернизировать наши производственные мощности."
 bm_industry_efficiency_project_option_civ_option:0 "Эффективность Гражданской Промышленности"
 bm_industry_efficiency_project_option_mil_option:0 "Эффективность Военной Промышленности"
 bm_industry_efficiency_project_tt:0 "По завершении этого проекта вы получите либо §YЭффективность Гражданской Промышленности§!, либо §YЭффективность Военной Промышленности§! — в зависимости от вашего выбора.\n\n"
