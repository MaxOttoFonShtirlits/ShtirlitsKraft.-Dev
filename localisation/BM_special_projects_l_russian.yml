 bm_infantry_fighting_vehicle_equipment:0 "Боевая машина пехоты"
 bm_infantry_fighting_vehicle_equipment_desc:0 "Универсальная бронированная машина, предназначенная для транспортировки пехоты в бой и оказания прямой огневой поддержки. Оснащена пулемётом и автоматической пушкой."
 bm_infantry_fighting_vehicle_equipment_0:0 "Боевая машина пехоты"
 bm_infantry_fighting_vehicle_equipment_0_desc:0 "Универсальная бронированная машина, предназначенная для транспортировки пехоты в бой и оказания прямой огневой поддержки. Оснащена пулемётом и автоматической пушкой."
 bm_mechanized_armored_infantry_company:0 "Механизированная бронированная пехота"
 bm_mechanized_armored_infantry_company_desc:0 "Универсальная бронированная машина, предназначенная для транспортировки пехоты в бой и оказания прямой огневой поддержки. Оснащена пулемётом и автоматической пушкой."
