 bm_pressurized_cabin_project:0 "Герметизация кабины"
 bm_pressurized_cabin_project_desc:0 "Процесс, при котором кондиционированный воздух закачивается в кабину самолёта или космического аппарата, создавая безопасные и комфортные условия для людей, находящихся на больших высотах."
 bm_pressurized_cabin_1:0 "Средняя герметизируемая кабина"
 bm_pressurized_cabin_1_desc:0 "Обеспечивает эффективную работу на больших высотах благодаря поддержанию внутреннего давления."
 bm_pressurized_cabin_2:0 "Большая герметизируемая кабина"
 bm_pressurized_cabin_2_desc:0 "Обеспечивает эффективную работу на больших высотах благодаря поддержанию внутреннего давления."
