 bm_seismic_exploration_dynamic_modifier:0 "Сейсморазведочные технологии"
 bm_seismic_exploration_dynamic_modifier_desc:0 "Сейсмические методы позволяют картировать подземные ресурсы с помощью анализа звуковых волн, повышая эффективность добычи и снижая риски бурения."
 bm_seismic_exploration_project:0 "Сейсморазведочные технологии"
 bm_seismic_exploration_project_desc:0 "Сейсморазведка использует звуковые волны для картирования подземных ресурсов, точно определяя месторождения нефти, газа и полезных ископаемых, повышая эффективность и сокращая число пустых буровых."
