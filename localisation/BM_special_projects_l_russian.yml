 bm_jacketed_bullets_project_piercer_tt:0 "\n £$ICON$  $NAME|Y$ \n\n$DESC$\n\n"
 bm_jacketed_bullets_by_the_end_tt:0 "По завершении этого проекта вы получите либо §YУдарные боеприпасы§!, либо §YПробивные боеприпасы§! в зависимости от вашего выбора."

 bm_penicillin_project:0 "Антибиотики"
 bm_penicillin_project_desc:0 "Разработайте передовые медицинские средства с использованием антибиотиков, чтобы произвести революцию в полевой медицине."
 bm_sp_penicillin_technology:0 "Антибиотики"
 bm_sp_penicillin_technology_desc:0 "Сосредоточено на снижении боевых потерь и улучшении восстановления личного состава."
