 bm_blood_plasma_project:0 "Переливание плазмы крови"
 bm_blood_plasma_project_desc:0 "Улучшайте свои полевые госпитали, увеличивая скорость восстановления раненых, чтобы спасти больше солдат, или сосредоточьтесь на уменьшении потери опыта, чтобы ваши подразделения сохраняли боевую эффективность после каждой битвы."
 bm_blood_plasma_project_reward:0 "Медицинская специализация"
 bm_blood_plasma_project_reward_desc:0 "Улучшайте свои полевые госпитали, увеличивая скорость восстановления раненых, чтобы спасти больше солдат, или сосредоточьтесь на уменьшении потери опыта."
