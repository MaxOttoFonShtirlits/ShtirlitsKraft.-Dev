 bm_tracked_mine_project:0 "Гусеничная мина"
 bm_tracked_mine_project_desc:0 "Дистанционно управляемые взрывные операции. Кроме того, проект позволяет развернуть специализированное вспомогательное подразделение для управления этими гусеничными минами, обеспечивая уникальное преимущество в инженерном деле и диверсиях, способных точно нарушать работу вражеских укреплений и бронетехники."
 bm_tracked_mine_equipment:0 "Гусеничная мина"
 bm_tracked_mine_equipment_desc:0 "Дистанционно управляемое взрывное устройство на гусеницах, предназначенное для преодоления пересечённой местности и доставки заряда непосредственно к вражеским целям."
 bm_tracked_mine_equipment_0:0 "Гусеничная мина"
 bm_tracked_mine_equipment_0_desc:0 "Дистанционно управляемое взрывное устройство на гусеницах, предназначенное для преодоления пересечённой местности и доставки заряда непосредственно к вражеским целям."
 bm_tracked_mine_company:0 "Рота гусеничных мин"
 bm_tracked_mine_company_desc:0 "Вспомогательное подразделение, специализирующееся на применении гусеничных мин для точечных диверсий, поражая вражескую бронетехнику, укрепления и линии снабжения с высокой точностью."
