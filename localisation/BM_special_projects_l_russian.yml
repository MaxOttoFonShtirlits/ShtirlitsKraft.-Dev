 bm_blood_plasma_project_tip_tt:0 "Вы можете снизить требуемые затраты на реализацию этого проекта до §Y0§! путем исследования $TECH_1|Y$.."
 bm_sp_blood_plasma_trickleback:0 "Сокращение потерь"
 bm_sp_blood_plasma_trickleback_desc:0 "Повышая эффективность полевых госпиталей, вы увеличиваете скорость возвращения раненых, что позволяет вашим войскам быстрее восстанавливаться."
 bm_sp_blood_plasma_experience:0 "Уменьшение потери опыта"
 bm_sp_blood_plasma_experience_desc:0 "Сосредоточение внимания на методах уменьшения потери опыта гарантирует, что ваши войска сохранят большую часть своей с трудом заработанной боевой эффективности."

 bm_jacketed_bullets_project:0 "Усовершенствованные боеприпасы"
 bm_jacketed_bullets_project_desc:0 "Этот проект улучшает стрелковое оружие за счёт использования пуль с металлической оболочкой, повышающих пробиваемость и эффективность."
 bm_jacketed_bullets_project_bonus:0 "Современные боеприпасы"
 bm_jacketed_bullets_project_impact_name:0 "Ударные боеприпасы"
 bm_jacketed_bullets_project_impact_desc:0 "Разработанные для универсальности, ударные боеприпасы обеспечивают повышающуюся останавливающую силу и улучшают защитные возможности."
 bm_jacketed_bullets_project_piercer_name:0 "Пробивные боеприпасы"
 bm_jacketed_bullets_project_piercer_desc:0 "Разработанные для максимального пробития, пробивные боеприпасы представляют собой передовые патроны, созданные для точного пробивания вражеской брони и укреплений."
 bm_jacketed_bullets_project_rewards:0 "Фокус на боеприпасах"
 bm_jacketed_bullets_project_rewards_desc:0 "Этот проект улучшает стрелковое оружие благодаря использованию оболочечных пуль, увеличивая пробивную способность и эффективность."
 bm_jacketed_bullets_project_impact_option:0 "Ударные боеприпасы"
 bm_jacketed_bullets_project_piercer_option:0 "Пробивные боеприпасы"
