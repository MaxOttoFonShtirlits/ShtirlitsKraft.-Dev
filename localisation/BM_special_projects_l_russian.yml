 bm_canines_project:0 "Служебные собаки"
 bm_canines_project_desc:0 "Интеграция специально обученных служебных собак в наши разведывательные и военной полиции подразделения даёт значительный бонус к разведке и безопасности. Эти верные помощники улучшают способности к разведке, обнаруживают скрытые угрозы, эффективно отслеживают перемещения врага и помогают поддерживать порядок и дисциплину."
 bm_canines_project_tt:0 "\n £$ICON$  $NAME|Y$\n\n$DESC$\n\n§YЭффекты§!§W:§!\n$STATS$"
 bm_sp_canine_technology:0 "Служебные собаки"
 bm_sp_canine_technology_desc:0 "Развёртывание обученных служебных собак в подразделениях разведки и военной полиции улучшает разведку и безопасность."

 bm_streamline_locomotion_project:0 "Обтекаемые локомотивы"
 bm_streamline_locomotion_project_desc:0 "Оптимизируя конструкцию локомотивов и улучшая железнодорожную инфраструктуру, этот проект направлен на предоставление значительных бонусов для бронированных или экономичных поездов."
 bm_streamline_locomotion_project_tt:0 "\n £$ICON$  $NAME|Y$\n\n$DESC$\n\n§YЭффекты§!:"
 bm_streamline_locomotion_project_wartime_train_bonus:0 "Экономичный поезд"
 bm_streamline_locomotion_project_armored_train_bonus:0 "Бронированный поезд"
 bm_streamline_locomotion_project_tt_desc:0 "Улучшает ваши поезда, делая их более устойчивыми и повышая эффективность логистики."

 bm_cluster_bomb_1:0 "Кассетные бомбы"
 bm_cluster_bomb_1_desc:0 "Модуль кассетной бомбы предлагает мощное дополнение к бомбовым ударам, рассеивая несколько малых боеприпасов на широком участке, повышая эффективность против пехоты и легко бронированных целей."
 bm_napalm_bomb_1:0 "Напалмовые бомбы"
 bm_napalm_bomb_1_desc:0 "Напалмовая бомба наносит разрушительный удар по площади, высвобождая огнеопасное вещество, наносящее тяжёлый урон на большом участке местности."
 bm_specialized_bombs_project:0 "Специализированные бомбы"
 bm_specialized_bombs_project_desc:0 "Усильте свою авиацию специализированными боеприпасами, выбрав кассетные бомбы для широкого поражения или напалмовые бомбы для создания огненного шторма."
 bm_specialized_bombs_project_tt:0 "После завершения этого проекта вы разблокируете либо §YКассетные бомбы§!, либо §YНапалмовые бомбы§!, в зависимости от вашего выбора.\n\n"
 bm_specialized_bombs_project_cluster_tt:0 "£$ICON$  $NAME|Y$\n\n$DESC$"
