 bm_enhanced_cipher_project:0 "Вычислительная криптология"
 bm_enhanced_cipher_project_desc:0 "Выберите: улучшить криптографические возможности для более эффективного дешифрования и шифрования или усилить разведсеть для повышения эффективности сбора и анализа информации о враге."
 bm_sp_enhanced_cipher_technology_1:0 "Криптология"
 bm_sp_enhanced_cipher_technology_1_desc:0 "Благодаря передовым криптографическим методам ваша страна получает значительные улучшения в дешифровании и шифровании, обеспечивая превосходство в разведке и контрразведке."
 bm_sp_enhanced_cipher_technology_2:0 "Расширение сети"
 bm_sp_enhanced_cipher_technology_2_desc:0 "Инвестиции в расширение и улучшение вашей разведывательной сети позволяют более эффективно собирать и анализировать информацию о противнике."
 bm_enhanced_cipher_project_reward:0 "Фокус на шифровании"
 bm_enhanced_cipher_project_reward_desc:0 "Выберите: улучшить криптографические возможности для более эффективного дешифрования и шифрования или усилить разведсеть для повышения эффективности сбора и анализа информации о враге."
