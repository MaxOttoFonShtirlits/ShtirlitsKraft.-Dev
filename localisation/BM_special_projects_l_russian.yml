 bm_specialized_bombs_project_rewards:0 "Специализированные бомбы"
 bm_specialized_bombs_project_rewards_desc:0 "Усильте свою авиацию специализированными боеприпасами, выбрав кассетные бомбы для широкого поражения или напалмовые — для создания огненного шторма."
