 bm_personal_body_armor_lightweight_tech_desc:0 "Отдаёт приоритет мобильности, заменяя тяжёлые стальные элементы более лёгкими сплавами, сохраняя при этом достойный уровень защиты."

 bm_guided_anti_tank_launcher_equipment:0 "ПТУР"
 bm_guided_anti_tank_launcher_equipment_desc:0 "Точное оружие для уничтожения бронетехники на дальних дистанциях, дающее пехоте важный инструмент против танков."
