 bm_hydraulic_fracturing_project:0 "Гидроразрыв пласта"
 bm_hydraulic_fracturing_project_desc:0 "Гидроразрыв — это передовая технология добычи газа и нефти из глубоких слоёв сланца путём закачки под давлением жидкости, что позволяет открыть доступ к ранее недоступным залежам."
 bm_sp_hydraulic_fracturing_dynamic_modifier:0 "Гидроразрыв пласта"
 bm_sp_hydraulic_fracturing_dynamic_modifier_desc:0 "Гидроразрыв — это передовая технология добычи газа и нефти из глубоких слоёв сланца путём закачки под давлением жидкости, что позволяет открыть доступ к ранее недоступным залежам."
