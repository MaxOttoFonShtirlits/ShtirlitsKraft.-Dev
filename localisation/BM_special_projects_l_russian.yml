 bm_attack_helicopter_project_reward:0 "Боевой упор"
 bm_attack_helicopter_project_reward_desc:0 "Повысить эффективность ударных вертолётов, сфокусировавшись либо на ракетных системах для увеличения пробиваемости брони, либо на улучшенном пушечном вооружении для повышения урона по пехоте и лёгкой технике."
